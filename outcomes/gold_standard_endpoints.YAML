    topic: alzheimer
    input: |
      Electroencephalography recording. Changes in Electroencephalography (EEG), resting state.
      The device records brain signals through 57 electrodes, 2 reference electrodes attached to
      the earlobes, and a ground electrode placed at a left anterior position
      [Time Frame: baseline,24 months]
    trial_context:
      condition: Mild Dementia (prevention with olive oil leaves)
      intervention: Beverage of Olive Oil Leaves + Mediterranean Diet
      population: Subjects with memory complaints and abnormal Logical Memory II
    endpoints:
      - endpoint_name_standardized: "Change in Resting-State EEG"
        measurement_of: "resting-state brain electrical activity"
        measurement_type: "continuous"
        metric_type: "change from baseline"
        timeframe: "baseline, 24 months"
        measurement_method: "Electroencephalography (EEG)"
        evaluation_criteria: null
        unit: null
        population: null
        is_composite: false
        components: []
    rationale: >
      EEG is a physical recording technique → measurement_method. Resting
      state is a paradigm/condition for the recording, not a separate
      endpoint or evaluation criterion (it's part of the protocol). EEG
      output is continuous (signal amplitudes over time, frequency-band
      powers), and "Changes in EEG" implies change from baseline. No
      explicit unit (would depend on metric: µV² for power, Hz for
      frequency, etc.) → null.


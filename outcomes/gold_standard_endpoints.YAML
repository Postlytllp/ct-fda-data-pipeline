  - idx: 14
    nct: NCT05003362
    topic: depression
    input: |
      Change in pain acceptance and pain expectancy.. Pain acceptance assessed through the
      Chronic Pain Acceptance Questionnaire and pain expectancy during the migraine attacks
      assessed using the allodynia questionnaire. [Time Frame: one year]
    trial_context:
      condition: Migraine
      intervention: ACT (Acceptance and Commitment Therapy) — virtual mindfulness
      population: Women aged 18-65 with episodic migraine
    endpoints:
      - endpoint_name_standardized: "Change in Pain Acceptance"
        measurement_of: "acceptance of chronic pain"
        measurement_type: "continuous"
        metric_type: "change from baseline"
        timeframe: "one year"
        measurement_method: null
        evaluation_criteria: "Chronic Pain Acceptance Questionnaire (CPAQ)"
        unit: null
        population: null
        is_composite: false
        components: []
      - endpoint_name_standardized: "Change in Pain Expectancy"
        measurement_of: "cutaneous allodynia / pain expectancy during migraine attacks"
        measurement_type: "continuous"
        metric_type: "change from baseline"
        timeframe: "one year"
        measurement_method: null
        evaluation_criteria: "Allodynia Symptom Checklist (ASC-12) — referred to as 'allodynia questionnaire'"
        unit: null
        population: null
        is_composite: false
        components: []
    rationale: >
      Two distinct constructs → two endpoints. CPAQ-20 has a continuous
      total score 0–120 (sum of two subscales); ASC-12 has a continuous
      total score 0–24 (sum of 12 items, 0–2 each). Both are
      self-report questionnaires → evaluation_criteria, with
      measurement_method=null. Unit could be "points"/"score" but is
      not stated in the source — null is the safe choice.
    sources:
      - https://resref.com/chronic-pain-acceptance-questionnaire-20-cpaq-20-a-full-guide/
      - https://pubmed.ncbi.nlm.nih.gov/31637701/


# Gold-standard extractions for the 15-sample evaluation set.
#
# Each sample contains:
#   input        — the verbatim outcome text fed to the model
#   nct          — ClinicalTrials.gov NCT identifier
#   topic        — the disease-area search term used to pull the sample
#   trial_context — extra context from CT.gov (condition, intervention,
#                   eligibility) that informs the gold standard but is NOT
#                   given to the model at inference time
#   endpoints    — the 11-field extraction we expect, applying the canonical
#                   training-time rules (named scoring instruments → ec, etc.)
#   rationale    — notes on judgment calls (especially measurement_type)
#   sources      — URLs consulted to resolve ambiguity
#
# Schema reference (from the training-time system prompt):
#   measurement_method = physical technique / tool to collect data
#                        (CT scan, MRI, ECG, blood test, etc.)
#                        NOT scoring systems / questionnaires.
#   evaluation_criteria = scoring system / guideline / rule that DEFINES
#                        the endpoint (RECIST v1.1, NYHA class, named
#                        questionnaires like SLEDAI/DAS28/CPAQ, etc.)
#   measurement_type    ∈ {continuous, binary, time-to-event, ordinal}
#   metric_type         ∈ examples: mean, median, proportion, hazard ratio,
#                                   change from baseline, count, score
#   unit                = explicit unit when stated or unambiguously
#                         standard (e.g., ORR → %, VO2 max → mL/kg/min)
#   population          = explicit population/subgroup when named
#   is_composite + components = composite-of-events endpoint structure

samples:

  # ============================================================
  - idx: 1
    nct: NCT07280741
    topic: rheumatoid
    input: |
      Disease safety (flare) - Systemic Lupus Erythematosus. Systemic Lupus Erythematosus (SLE):
      An increase of more than three points in the Systemic Lupus Erythematosus Disease Activity
      Index 2000 (SLEDAI-2K). Score: 0 - No activity; 1 - 4 mild activity; > 6 high activity
      [Time Frame: Day 1 (baseline) through day 42 and six weeks after the second dose D84.]
    trial_context:
      condition: Autoimmune Rheumatic Diseases
      intervention: Recombinant Zoster Vaccine (RZV)
      population: Adults ≥18 with autoimmune rheumatic diseases (RA, SLE, etc.) on
        immunomodulatory monotherapy
    endpoints:
      - endpoint_name_standardized: "SLE Disease Flare"
        measurement_of: "systemic lupus erythematosus disease activity flare"
        measurement_type: "binary"
        metric_type: "proportion"
        timeframe: "Day 1 (baseline) through day 42 and six weeks after the second dose D84"
        measurement_method: null
        evaluation_criteria: "SLEDAI-2K (Systemic Lupus Erythematosus Disease Activity Index 2000), increase of >3 points"
        unit: null
        population: null
        is_composite: false
        components: []
    rationale: >
      The endpoint as written is OPERATIONALLY a binary "flare yes/no" event,
      defined by a threshold change (>3 points) in the SLEDAI-2K score. The
      SLEDAI-2K itself is a continuous additive index 0–105 (a sum of 24
      weighted clinical descriptors), but the OUTCOME being measured here is
      the binary flare event derived from it — hence measurement_type=binary
      and metric_type=proportion. The threshold rule is captured inside
      evaluation_criteria along with the named instrument. measurement_method
      is null because no physical assay (blood test, imaging, etc.) is the
      data source — SLEDAI-2K is a clinical scoring instrument.
    sources:
      - https://www.mdcalc.com/calc/10099/systemic-lupus-erythematosus-disease-activity-index-2000-sledai-2k
      - https://pubmed.ncbi.nlm.nih.gov/11838846/
      - https://www.frontiersin.org/journals/lupus/articles/10.3389/flupu.2024.1442013/full


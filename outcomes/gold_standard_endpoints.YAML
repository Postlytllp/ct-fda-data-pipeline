  # ============================================================
  - idx: 6
    nct: NCT05432297
    topic: cancer
    input: |
      Subjectively measured physical activity - Saltin-Grimby. Measured with the Saltin-Grimby
      physical activity level scale and the International Physical Activity Questionnaire.
      [Time Frame: Up to 12 months]
    trial_context:
      condition: Head and Neck Neoplasms (oropharynx/larynx/hypopharynx)
      intervention: Preventive physical exercise during radiotherapy
      population: H&N cancer patients receiving curative radiotherapy ± chemotherapy
    endpoints:
      - endpoint_name_standardized: "Subjectively Measured Physical Activity Level"
        measurement_of: "leisure-time physical activity level"
        measurement_type: "ordinal"
        metric_type: "score"
        timeframe: "Up to 12 months"
        measurement_method: null
        evaluation_criteria: "Saltin-Grimby Physical Activity Level Scale (SGPALS); International Physical Activity Questionnaire (IPAQ)"
        unit: null
        population: null
        is_composite: false
        components: []
    rationale: >
      Saltin-Grimby is a 4-level ordinal scale (1=inactive, 2=light, 3=regular,
      4=vigorous regular). IPAQ output can be expressed as continuous
      MET-min/week or as ordinal categories (low/moderate/high) — most
      commonly the categorical form when paired with SGPALS. So the
      combined endpoint is best treated as ordinal. Both instruments are
      named scoring tools → evaluation_criteria. measurement_method is null
      because both are self-/subject-reported questionnaires (no physical
      assay or device).
    sources:
      - https://pmc.ncbi.nlm.nih.gov/articles/PMC9436064/
      - https://onlinelibrary.wiley.com/doi/full/10.1111/sms.12611


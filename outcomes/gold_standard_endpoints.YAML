  # ============================================================
  - idx: 8
    nct: NCT05254223
    topic: rheumatoid
    input: |
      Changes in disease activity. Disease activity is determined by DAS28 score_ erythrocyte
      sedimentation rate (DAS28-ESR) [Time Frame: Day 0, month 4, month 8 and month12.]
    trial_context:
      condition: Rheumatoid Arthritis
      intervention: Anti-inflammatory diet vs control diet
      population: RA patients
    endpoints:
      - endpoint_name_standardized: "Change in DAS28-ESR"
        measurement_of: "rheumatoid arthritis disease activity"
        measurement_type: "continuous"
        metric_type: "change from baseline"
        timeframe: "Day 0, month 4, month 8, and month 12"
        measurement_method: "blood test"
        evaluation_criteria: "DAS28-ESR (Disease Activity Score in 28 joints with erythrocyte sedimentation rate)"
        unit: null
        population: null
        is_composite: false
        components: []
    rationale: >
      DAS28-ESR is a continuous score (0–9.4 typical range) computed from
      tender joint count, swollen joint count, ESR (a blood test), and
      patient global assessment. Although clinical thresholds (≤3.2 low,
      >5.1 high disease activity) make ordinal categorization possible,
      the underlying score is continuous and the outcome here is "change",
      so measurement_type=continuous and metric_type=change from baseline.
      ESR requires a blood draw → measurement_method="blood test" (the
      unique laboratory component). The named instrument goes in
      evaluation_criteria. unit=null because DAS28 is unitless.
    sources:
      - https://en.wikipedia.org/wiki/DAS28


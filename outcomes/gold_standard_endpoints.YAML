  - idx: 10
    nct: NCT03212391
    topic: hypertension
    input: |
      VO2 max. maximal oxygen consumption [Time Frame: 12 months]
    trial_context:
      condition: Abdominal Obesity, Metabolic Syndrome, Hypertension
      intervention: Diet ± Walking / Nordic Walking
      population: Adults 60-90, BMI >27, living in Verona Italy
    endpoints:
      - endpoint_name_standardized: "VO2 max"
        measurement_of: "maximal oxygen consumption (aerobic capacity)"
        measurement_type: "continuous"
        metric_type: "mean"
        timeframe: "12 months"
        measurement_method: "cardiopulmonary exercise test"
        evaluation_criteria: null
        unit: "mL/kg/min"
        population: null
        is_composite: false
        components: []
    rationale: >
      VO2 max is by definition measured during a graded cardiopulmonary
      exercise test (CPET) with gas exchange analysis. The trial doesn't
      explicitly say "CPET" but the only way to measure VO2 max IS CPET,
      so the inferred measurement_method is appropriate (analogous to ORR
      → % being inferable). unit="mL/kg/min" is the universally standard
      VO2 max unit and is unambiguously inferable.

